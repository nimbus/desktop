name: e2e

# DS7 packaged-shell E2E gate. Builds production installers per
# platform, builds the matching `nimbus` binary from a sibling
# checkout of nimbus/nimbus@main (rusty_v8 ships prebuilt static
# libs, so this is not a V8-from-source build), points the shell
# at it via NIMBUS_DESKTOP_NIMBUS_BIN, then runs the Playwright
# specs against the packaged Electron binary.
#
# Building nimbus from source rather than downloading a tagged
# release keeps the shell tested against tip-of-main nimbus —
# critical pre-launch when UI changes (DU items) land between
# releases and the shell's /ui/ surface depends on them.
#
# The specs exercise the full DS2/DS3/DS7 surface:
#   - critical-path.spec.ts: shell connects to a pre-running nimbus,
#     reaches /ui/, security restrictions hold (DS3 fuses).
#   - lifecycle.spec.ts: shell spawns nimbus when none is running,
#     reaps it on shutdown, and relaunches against the same scratch
#     state without orphaning the previous server.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: package:mac
            nimbus_bin_subpath: nimbus
            name: mac-arm64
            e2e_runner_prefix: ""
          - os: ubuntu-24.04
            target: package:linux
            nimbus_bin_subpath: nimbus
            name: linux-x64
            # GitHub Actions Linux runners have no display; the packaged
            # Electron shell still creates a BrowserWindow on startup,
            # so the e2e step runs under xvfb. macOS/Windows runners
            # have real GUIs and need no prefix.
            e2e_runner_prefix: "xvfb-run -a"
          - os: windows-2022
            target: package:win
            nimbus_bin_subpath: nimbus.exe
            name: win-x64
            e2e_runner_prefix: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      # Match the nimbus release workflow's git-fetch strategy so
      # rusty_v8's large submodules can resolve through the git CLI
      # on Windows long-path filesystems.
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout desktop
        uses: actions/checkout@v4

      - name: Checkout nimbus (sibling source for build)
        uses: actions/checkout@v4
        with:
          repository: nimbus/nimbus
          path: nimbus-src
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Windows-only: the deno fork's `lsp_benchdata` submodule has
      # paths past Windows MAX_PATH (260 chars) once Cargo unpacks it
      # under `~/.cargo/git/checkouts/...`. Without longpaths the
      # submodule fetch fails with `path too long: 'C:/...class=Filesystem (30)'`.
      # Matches the nimbus release.yml pattern.
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --global core.longpaths true

      # Windows-only: the deno fork pulls `openssl-sys` with the vendored
      # feature, whose build.rs invokes Perl to drive OpenSSL's Configure.
      # The runner's preinstalled Perl is sometimes ActiveState which
      # mis-parses CRLF args; Strawberry Perl matches what the nimbus
      # release.yml proves clean.
      - name: Set up Windows Perl
        if: runner.os == 'Windows'
        uses: shogo82148/actions-setup-perl@v1
        with:
          distribution: strawberry
          perl-version: "5.42"

      - name: Export Windows Perl for vendored OpenSSL
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $perlExe = (Get-Command perl).Source
          "PERL=$perlExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_SRC_PERL=$perlExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache cargo build (nimbus)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nimbus-src -> target
          key: nimbus-${{ matrix.name }}

      - name: Build nimbus from source
        shell: bash
        working-directory: ${{ github.workspace }}/nimbus-src
        run: |
          set -euo pipefail
          cargo --version
          rustc --version
          # nimbus-bin is the binary crate; build it in release mode to
          # match the dev-loop convention the helper looks for.
          cargo build --release -p nimbus-bin
          # The binary lives at target/release/${nimbus_bin_subpath};
          # resolve to an absolute path so the spawn-detached child
          # inherits a path that survives the shell's scratch cwd.
          bin_path="target/release/${{ matrix.nimbus_bin_subpath }}"
          if [ ! -f "$bin_path" ]; then
            echo "Expected nimbus binary at $bin_path after build:"
            ls -la target/release | head -20
            exit 1
          fi
          abs_path="$(cd "$(dirname "$bin_path")" && pwd)/$(basename "$bin_path")"
          echo "NIMBUS_DESKTOP_NIMBUS_BIN=$abs_path" >> "$GITHUB_ENV"
          echo "built nimbus binary: $abs_path"
          "$abs_path" --version || true

      - name: Install Linux GUI deps for packaged Electron
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          # xvfb provides a virtual framebuffer for the headless runner.
          # libnss3 / libatk-bridge2.0-0 / libgtk-3-0 / libgbm1 are the
          # baseline Chromium runtime libs not always present on the
          # base ubuntu-24.04 image; libasound2t64 satisfies Electron's
          # audio runtime probe.
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            libasound2t64

      - name: Package the shell
        run: npm run ${{ matrix.target }}

      - name: Run packaged-shell E2E
        run: ${{ matrix.e2e_runner_prefix }} npm run test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces-${{ matrix.name }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
